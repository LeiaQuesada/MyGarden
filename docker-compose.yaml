services:
  postgres:
    image: postgres:16
    container_name: mygarden
    hostname: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mygarden
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg:/var/tmp/pg
    ports:
      - 5442:5432
    healthcheck:
      test: pg_isready -U postgres || exit 1
    stop_grace_period: 1m
volumes:
  postgres_data:
